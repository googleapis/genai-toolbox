sources:
    lookerca-source:
        kind: lookerca
        base_url: ${LOOKERCA_BASE_URL}
        client_id: ${LOOKERCA_CLIENT_ID:}
        client_secret: ${LOOKERCA_CLIENT_SECRET:}
        verify_ssl: ${LOOKERCA_VERIFY_SSL:true}
        timeout: 600s
        use_client_oauth: ${LOOKERCA_USE_CLIENT_OAUTH:false}
        project: ${LOOKERCA_PROJECT:}
        location: ${LOOKERCA_LOCATION:}

tools:
    ask_data_insights:
        kind: lookerca-conversational-analytics
        source: lookerca-source
        description: |
          Use this tool to perform data analysis, get insights,
          or answer complex questions about the contents of specific
          Looker explores.

toolsets:
    lookerca_tools:
        - ask_data_insights
